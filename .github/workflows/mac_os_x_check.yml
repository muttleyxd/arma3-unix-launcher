name: Mac OS X check

on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test-no-steamworks:
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x86_64
            runner: macos-26-intel
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v2
    - name: install-dependencies
      run: brew install cmake qt@6
    - name: make build directory
      run: mkdir build && cd build
    - name: cmake
      run: cd build && cmake .. -DCPACK_GENERATOR=DragNDrop -DCMAKE_PREFIX_PATH="$(brew --prefix);$(brew --prefix qt@6)" -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-Werror" -DRUN_TESTS=ON -DDEVELOPER_MODE=ON -DCMAKE_OSX_DEPLOYMENT_TARGET=13.3 -DCMAKE_OSX_SYSROOT=macosx
    - name: build
      run: cd build && make -j$(sysctl -n hw.ncpu)
    - name: run tests
      run: cd build && ctest --output-on-failure
