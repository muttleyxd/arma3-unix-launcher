name: Linux packages

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  archlinux-gcc:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set permissions
      run: chmod 777 ${{ github.workspace }}
    - name: Get version info
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        COMMIT_SHORT=$(git rev-parse --short HEAD)
        echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
        echo "commit_short=$COMMIT_SHORT" >> $GITHUB_OUTPUT
        echo "tag=commit-$COMMIT_COUNT" >> $GITHUB_OUTPUT
        echo "pkgver=${COMMIT_COUNT}.${COMMIT_SHORT}" >> $GITHUB_OUTPUT
    - name: Run the build process with Docker
      run: |
        docker run --rm \
          --user root \
          -v ${{ github.workspace }}:/github/workspace \
          muttleyxd/a3ul_archlinux_build:latest \
          bash -c "
            set -euxo pipefail

            # Configure git safe.directory for makepkg
            # makepkg sets GIT_CONFIG_GLOBAL=/dev/null and uses /etc/makepkg.d/gitconfig
            mkdir -p /etc/makepkg.d
            printf '[safe]\n\tdirectory = *\n' > /etc/makepkg.d/gitconfig

            # Run build as builduser (makepkg cannot run as root)
            su builduser -c '
              set -euxo pipefail
              cd /github/workspace
              tools/ci/packaging/archlinux/build.sh /github/workspace /tmp/build /tmp/build
              ls /tmp/build
            '

            # Copy to workspace as root (builduser may not have write permissions)
            cp /tmp/build/*.pkg.tar* /github/workspace/
          "
    - name: Create/update release and upload packages
      if: github.ref == 'refs/heads/master'
      uses: xresloader/upload-to-github-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.actionrelease }}
      with:
        file: "*.pkg.tar.*"
        tag_name: ${{ steps.version.outputs.tag }}
        release_name: "arma3-unix-launcher commit ${{ steps.version.outputs.commit_count }}"
        draft: false
        prerelease: false
        overwrite: true
        verbose: true

  appimage-gcc-8:
