        echo "commit_short=$COMMIT_SHORT" >> $GITHUB_OUTPUT
        echo "tag=commit-$COMMIT_COUNT" >> $GITHUB_OUTPUT
        echo "pkgver=${COMMIT_COUNT}.${COMMIT_SHORT}" >> $GITHUB_OUTPUT
    - name: Run the build process with Docker
      run: |
