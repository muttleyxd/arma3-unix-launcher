name: Mac OS X release deployment

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    matrix:
      strategy:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x86_64
            runner: macos-26-intel
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Get version info
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        COMMIT_SHORT=$(git rev-parse --short HEAD)
        echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
        echo "commit_short=$COMMIT_SHORT" >> $GITHUB_OUTPUT
        echo "tag=commit-$COMMIT_COUNT" >> $GITHUB_OUTPUT
        echo "pkgver=${COMMIT_COUNT}.${COMMIT_SHORT}" >> $GITHUB_OUTPUT
    - name: install-dependencies
      run: |
        brew install cmake qt@6 p7zip wget gpg
    - name: make build directory
      run: mkdir build && cd build
    - name: cmake
      run: cd build && cmake .. -DCPACK_GENERATOR=DragNDrop -DCMAKE_PREFIX_PATH="$(brew --prefix);$(brew --prefix qt@6)" -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-Werror" -DRUN_TESTS=ON -DDEVELOPER_MODE=ON -DCMAKE_OSX_DEPLOYMENT_TARGET=13.3 -DCMAKE_OSX_SYSROOT=macosx
    - name: build
      run: cd build && make -j$(sysctl -n hw.ncpu)
    - name: run tests
      run: cd build && ctest --output-on-failure
    - name: make package
      run: |
        cd build
        make package
        mv arma3-unix-launcher-*.dmg arma3-unix-launcher-${{ steps.version.outputs.pkgver }}-mac_os_x-${{ matrix.arch }}.dmg
    - name: Create/update release and upload DMG
      if: github.ref == 'refs/heads/master'
      uses: xresloader/upload-to-github-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.actionrelease }}
      with:
        file: "build/*.dmg"
        tag_name: ${{ steps.version.outputs.tag }}
        release_name: "arma3-unix-launcher commit ${{ steps.version.outputs.commit_count }}"
        draft: false
        prerelease: false
        overwrite: true
        verbose: true
