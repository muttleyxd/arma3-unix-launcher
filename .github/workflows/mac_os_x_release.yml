name: Mac OS X release deployment

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Get version info
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        COMMIT_SHORT=$(git rev-parse --short HEAD)
        echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
        echo "commit_short=$COMMIT_SHORT" >> $GITHUB_OUTPUT
        echo "tag=commit-$COMMIT_COUNT" >> $GITHUB_OUTPUT
        echo "pkgver=${COMMIT_COUNT}.${COMMIT_SHORT}" >> $GITHUB_OUTPUT
    - name: install-dependencies
      run: |
        brew install gcc@11 cmake qt@5 p7zip wget gpg openssl@1.1
    - name: make build directory
      run: mkdir build && cd build
    - name: cmake
      run: cd build && cmake .. -DCPACK_GENERATOR=DragNDrop -DCMAKE_PREFIX_PATH='/usr/local;/opt/homebrew;/opt/homebrew/opt/qt@5;/opt/homebrew/opt/openssl@1.1' -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-Werror -static-libgcc" -DCMAKE_C_COMPILER=gcc-11 -DCMAKE_CXX_COMPILER=g++-11 -DRUN_TESTS=ON -DDEVELOPER_MODE=ON -DCMAKE_OSX_DEPLOYMENT_TARGET=10.12
    - name: build
      run: cd build && make -j$(sysctl -n hw.ncpu)
    - name: run tests
      run: cd build && ctest --output-on-failure
    - name: make package
      run: |
        cd build
        make package
        mv arma3-unix-launcher-*.dmg arma3-unix-launcher-${{ steps.version.outputs.pkgver }}-mac_os_x-x86_64.dmg
    - name: Create/update release and upload DMG
      if: github.ref == 'refs/heads/master'
      uses: xresloader/upload-to-github-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.actionrelease }}
      with:
        file: "build/*.dmg"
        tag_name: ${{ steps.version.outputs.tag }}
        release_name: "arma3-unix-launcher commit ${{ steps.version.outputs.commit_count }}"
        draft: false
        prerelease: false
        overwrite: true
        verbose: true
